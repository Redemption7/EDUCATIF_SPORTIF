<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5BA84F;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3D7A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5F3D;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE135;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer rings -->
  <circle cx="200" cy="200" r="198" fill="none" stroke="#FF9500" stroke-width="10"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="#FFE135" stroke-width="8"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="#2D5F3D" stroke-width="6"/>
  
  <!-- Main background -->
  <circle cx="200" cy="200" r="170" fill="url(#bgGrad)"/>
  
  <!-- Africa silhouette (simplified) -->
  <path d="M 200 100 L 260 130 L 280 180 L 270 240 L 220 260 L 180 265 L 140 235 L 130 180 L 140 130 Z" fill="#1A2E3A" opacity="0.95"/>
  
  <!-- Soccer ball pattern on Africa -->
  <circle cx="200" cy="160" r="35" fill="none" stroke="#1A2E3A" stroke-width="2" opacity="0.3"/>
  <path d="M 200 160 L 220 175 M 200 160 L 180 175 M 200 160 L 200 140" stroke="#1A2E3A" stroke-width="1" opacity="0.3"/>
  
  <!-- Left basketball -->
  <circle cx="130" cy="130" r="16" fill="url(#ballGrad)" stroke="#FF9500" stroke-width="2"/>
  <path d="M 120 120 L 140 140 M 140 120 L 120 140" stroke="#FF9500" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="130" cy="130" r="12" fill="none" stroke="#FF9500" stroke-width="1" opacity="0.6"/>
  
  <!-- Right basketball -->
  <circle cx="270" cy="130" r="16" fill="url(#ballGrad)" stroke="#FF9500" stroke-width="2"/>
  <path d="M 260 120 L 280 140 M 280 120 L 260 140" stroke="#FF9500" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="270" cy="130" r="12" fill="none" stroke="#FF9500" stroke-width="1" opacity="0.6"/>
  
  <!-- Bottom basketball -->
  <circle cx="200" cy="280" r="16" fill="url(#ballGrad)" stroke="#FF9500" stroke-width="2"/>
  <path d="M 190 270 L 210 290 M 210 270 L 190 290" stroke="#FF9500" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="200" cy="280" r="12" fill="none" stroke="#FF9500" stroke-width="1" opacity="0.6"/>
  
  <!-- Crescent moon at bottom -->
  <path d="M 170 320 Q 200 335 230 320" fill="none" stroke="#FF9500" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M 175 330 Q 200 342 225 330" fill="none" stroke="#FFE135" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Center NK text with background -->
  <rect x="155" y="155" width="90" height="90" rx="8" fill="#1A2E3A" opacity="0.98"/>
  <text x="200" y="210" font-size="56" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">NK</text>
  
  <!-- EDUCATIF SPORTIF text -->
  <text x="200" y="355" font-size="16" font-weight="bold" fill="#FF9500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" letter-spacing="1">EDUCATIF SPORTIF</text>
</svg>
