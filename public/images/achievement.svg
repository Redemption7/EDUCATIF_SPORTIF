<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="educationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5F3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A4d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="medalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE135;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#educationGrad)"/>
  
  <!-- Training cones -->
  <polygon points="80,320 100,200 60,200" fill="#FF9500"/>
  <polygon points="150,340 170,200 130,200" fill="#FFE135"/>
  <polygon points="220,330 240,200 200,200" fill="#FF9500"/>
  
  <!-- Medal 1 -->
  <circle cx="300" cy="120" r="35" fill="url(#medalGrad)" stroke="#1A2E3A" stroke-width="2"/>
  <circle cx="300" cy="120" r="30" fill="none" stroke="#1A2E3A" stroke-width="1"/>
  <text x="300" y="130" font-size="40" font-weight="bold" fill="#1A2E3A" text-anchor="middle">1</text>
  <rect x="290" y="50" width="20" height="70" fill="#FFE135" stroke="#1A2E3A" stroke-width="1"/>
  
  <!-- Trophy -->
  <path d="M 380 320 L 360 200 L 380 180 L 400 180 L 420 200 L 400 320 Z" fill="url(#medalGrad)" stroke="#1A2E3A" stroke-width="2"/>
  <rect x="350" y="320" width="100" height="15" fill="#1A2E3A"/>
  <polygon points="400,140 380,160 420,160" fill="url(#medalGrad)" stroke="#1A2E3A" stroke-width="2"/>
  
  <!-- Athletes cheering -->
  <circle cx="500" cy="280" r="20" fill="#1A2E3A" opacity="0.7"/>
  <rect x="495" y="300" width="10" height="35" fill="#1A2E3A" opacity="0.7"/>
  <rect x="510" y="305" width="10" height="30" fill="#1A2E3A" opacity="0.7"/>
  
  <!-- Stars -->
  <polygon points="120,80 125,95 142,95 130,105 135,120 120,110 105,120 110,105 98,95 115,95" fill="#FFE135" opacity="0.8"/>
  <polygon points="480,100 485,115 502,115 490,125 495,140 480,130 465,140 470,125 458,115 475,115" fill="#FFE135" opacity="0.6"/>
</svg>